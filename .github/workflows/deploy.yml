name: Build and Deploy to Azure Container Apps

on:
  push:
    branches: [master]
  workflow_dispatch:

env:
  ACR_NAME: acrchurchattendance
  RESOURCE_GROUP: rg-church-attendance
  CONTAINER_APP_NAME: ca-church-attendance
  IMAGE_NAME: church-attendance

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to Azure
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Log in to Azure Container Registry
        run: |
          az acr login --name ${{ env.ACR_NAME }}

      - name: Build and push container image
        run: |
          SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-7)
          BUILD_VERSION="${{ github.run_number }}-${SHORT_SHA}"
          docker build \
            --no-cache \
            --build-arg APP_VERSION="${BUILD_VERSION}" \
            -t ${{ env.ACR_NAME }}.azurecr.io/${{ env.IMAGE_NAME }}:${{ github.sha }} \
            -t ${{ env.ACR_NAME }}.azurecr.io/${{ env.IMAGE_NAME }}:latest .
          docker push ${{ env.ACR_NAME }}.azurecr.io/${{ env.IMAGE_NAME }}:${{ github.sha }}
          docker push ${{ env.ACR_NAME }}.azurecr.io/${{ env.IMAGE_NAME }}:latest

      - name: Deploy to Azure Container Apps
        run: |
          SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-7)
          SUFFIX="cd-${SHORT_SHA}"
          IMAGE="${{ env.ACR_NAME }}.azurecr.io/${{ env.IMAGE_NAME }}:${{ github.sha }}"
          az containerapp update \
            --name ${{ env.CONTAINER_APP_NAME }} \
            --resource-group ${{ env.RESOURCE_GROUP }} \
            --container-name church-attendance \
            --image "${IMAGE}" \
            --revision-suffix "${SUFFIX}"
