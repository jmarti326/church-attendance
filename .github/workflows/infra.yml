name: Deploy Infrastructure

on:
  workflow_dispatch:
    inputs:
      location:
        description: 'Azure region'
        required: true
        default: 'eastus'
        type: choice
        options:
          - eastus
          - eastus2
          - westus2
          - centralus

jobs:
  deploy-infra:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to Azure
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Deploy Bicep
        uses: azure/arm-deploy@v2
        with:
          scope: subscription
          region: ${{ inputs.location }}
          template: infra/main.bicep
          parameters: >
            resourceGroupName=rg-church-attendance
            location=${{ inputs.location }}
            acrName=acrchurchattendance
            environmentName=cae-church-attendance
            containerAppName=ca-church-attendance
            imageTag=latest
